
[build]
  publish = "."
  
[functions]
  directory = "netlify/functions"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; font-src 'self' cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' /.netlify/functions"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache Headers for static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, immutable"

# Compression
[[headers]]
  for = "/*"
  [headers.values]
    Accept-Encoding = "gzip, deflate, br"

# Redirects for Performance
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

# Netlify Edge Functions cache
[build.environment]
  NODE_ENV = "production"

# Error page configuration
[[custom_errors]]
  errorCode = "404"
  file = "/index.html"
  status_code = "404"

[[custom_errors]]
  errorCode = "500"
  file = "/index.html"
  status_code = "500"

[context.production]
  command = "echo 'Production build complete'"

[context.deploy-preview]
  command = "echo 'Deploy preview build complete'"

[context.branch-deploy]
  command = "echo 'Branch build complete'"